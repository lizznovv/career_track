{% extends 'base.html' %}
{% block content %}
<h1>Поиск талантов</h1>
<p class="text-muted">Нажмите на кандидата, чтобы посмотреть его компетенции.</p>

<div class="events-grid">
    {% for user in users %}
        <div class="card history-panel border-success">
            <h3>{{ user.username }}</h3>
            <p class="text-muted">Email: {{ user.mail }}</p>
            <p>Уровень платформы: <strong class="text-primary">{{ user.points }} XP</strong></p>
            <a href="{{ url_for('talent_detail', user_id=user.id) }}" class="btn btn-primary w-100" style="margin-top: 15px;">Посмотреть профиль</a>
        </div>
    {% endfor %}
</div>
{% endblock %}
